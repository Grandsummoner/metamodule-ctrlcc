<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaModule MIDI CC Patch Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f8f8;--surface:#ffffff;--surface2:#f2f2f2;--surface3:#eaeaea;
  --border:#e2e2e2;--border2:#c8c8c8;
  --text:#111111;--text2:#555555;--text3:#999999;
  --s0:#2563eb;--s0-bg:#eff6ff;--s0-border:#bfdbfe;--s0-light:#dbeafe;
  --s1:#16a34a;--s1-bg:#f0fdf4;--s1-border:#bbf7d0;
  --s2:#ea580c;--s2-bg:#fff7ed;--s2-border:#fed7aa;
  --s3:#7c3aed;--s3-bg:#f5f3ff;--s3-border:#ddd6fe;
  --r:4px;--r2:6px;--font:'Inter',system-ui,sans-serif
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.4;min-height:100vh}

/* Header */
header{border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;background:#fff;position:sticky;top:0;z-index:100;gap:8px;flex-wrap:wrap}
.logo{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.logo span{font-weight:400;color:var(--text3)}
.hdr-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
input.patch-name{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;font-weight:600;padding:5px 10px;width:200px;outline:none}
input.patch-name:focus{border-color:var(--s0);box-shadow:0 0 0 2px var(--s0-light)}

/* Buttons */
.btn{background:#fff;border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);font-family:var(--font);font-size:12px;padding:5px 12px;cursor:pointer;transition:all .1s;white-space:nowrap}
.btn:hover{background:var(--surface2);color:var(--text);border-color:#aaa}
.btn-primary{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:500}
.btn-primary:hover{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.btn-danger{color:#dc2626;border-color:#fecaca}
.btn-danger:hover{background:#fef2f2;border-color:#fca5a5}

/* Device bar */
.device-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.device-bar label{font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap}
.device-bar select{background:#fff;border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:5px 8px;outline:none;cursor:pointer;min-width:150px}
.device-bar select:focus{border-color:var(--s0)}
.device-info{font-size:11px;color:var(--s0);font-weight:500;background:var(--s0-bg);padding:2px 8px;border-radius:10px;border:1px solid var(--s0-border)}

/* Layout */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 82px)}
.sidebar{border-right:1px solid var(--border);background:#fff;overflow-y:auto;position:sticky;top:82px;height:calc(100vh - 82px)}

/* Sidebar sections */
.sb-sect{padding:12px 0 4px}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:0 14px 7px}
.divider{height:1px;background:var(--border);margin:4px 0}

/* Set tabs */
.set-tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:6px 10px}
.set-tab{border:1.5px solid transparent;border-radius:var(--r);padding:9px 8px;cursor:pointer;text-align:center;transition:all .12s;background:#fff}
.set-tab:hover{filter:brightness(.95)}
.set-tab-name{font-size:12px;font-weight:700;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-tab-count{font-size:10px;color:inherit;opacity:.7;margin-top:1px}
.set-name-row{padding:5px 10px 8px}
.set-name-inp{width:100%;background:#fff;border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:5px 9px;outline:none}
.set-name-inp:focus{border-color:var(--s0)}

/* Knob list */
.knob-list{padding:2px 8px 12px}
.knob-item{border:1.5px solid var(--border);border-radius:var(--r2);padding:7px 9px;margin-bottom:3px;cursor:pointer;transition:all .1s;background:#fff}
.knob-item:hover{border-color:var(--border2);background:var(--surface2)}
.ki-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.ki-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ki-num{font-size:11px;font-weight:700;color:var(--text2)}
.ki-cc{font-size:10px;color:var(--text3);margin-left:auto;font-variant-numeric:tabular-nums}
.ki-ch{font-size:10px;color:var(--text3)}
.ki-name{font-size:11px;color:var(--text);font-weight:500;padding-left:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ki-unset{font-size:11px;color:var(--text3);font-style:italic;padding-left:15px}

/* Main area */
.main{padding:18px 22px;overflow-y:auto;background:var(--bg)}
.main-hdr{margin-bottom:14px;display:flex;align-items:center;gap:8px}
.main-hdr-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.main-hdr h2{font-size:15px;font-weight:700}
.main-hdr p{font-size:12px;color:var(--text2);margin-top:1px}

/* Cards */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px}
.card h3{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.form-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.form-row:last-child{margin-bottom:0}
.form-row label{font-size:12px;font-weight:500;color:var(--text2);min-width:80px}
.form-row input[type=text]{background:#fff;border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:5px 9px;flex:1;outline:none}
.form-row input[type=text]:focus{border-color:var(--s0);box-shadow:0 0 0 2px var(--s0-light)}
.form-row select{background:#fff;border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:12px;padding:5px 8px;outline:none;cursor:pointer;flex:1}
.form-row select:focus{border-color:var(--s0)}
.info-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.info-pill{font-size:12px;color:var(--text2)}
.info-pill strong{color:var(--text)}
.clear-btn{background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:3px}
.clear-btn:hover{color:#dc2626;background:#fef2f2}

/* Category buttons */
.cat-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.cat-btn{background:var(--surface2);border:1.5px solid transparent;border-radius:20px;color:var(--text2);font-size:11px;font-weight:500;padding:4px 12px;cursor:pointer;transition:all .1s}
.cat-btn:hover{background:var(--surface3);color:var(--text)}
.cat-btn.active{background:#fff;border-color:var(--s0);color:var(--s0);font-weight:600}

/* Param grid */
.param-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:3px}
.param-btn{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:12px;padding:7px 10px;cursor:pointer;text-align:left;transition:all .1s;display:flex;align-items:center;justify-content:space-between;gap:6px}
.param-btn:hover{border-color:var(--s0);color:var(--text);background:var(--s0-bg)}
.param-btn.selected{border-color:var(--s0);color:var(--s0);background:var(--s0-bg);font-weight:600}
.param-btn.selected .param-cc{color:var(--s0);opacity:.7}
.param-cc{font-size:10px;color:var(--text3);white-space:nowrap;font-variant-numeric:tabular-nums}

/* Empty state */
.no-device{text-align:center;padding:80px 20px;color:var(--text3)}
.no-device p{font-size:14px;margin-top:6px}

/* Toast */
.status{position:fixed;bottom:16px;right:18px;background:#111;border-radius:var(--r2);padding:8px 14px;font-size:12px;color:#fff;opacity:0;transition:opacity .2s;pointer-events:none;z-index:300}
.status.show{opacity:1}

/* Overview table */
.ov-table{width:100%;border-collapse:collapse;font-size:12px}
.ov-table th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:2px solid var(--border)}
.ov-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.ov-table tr:last-child td{border-bottom:none}
.ov-table tr:hover td{background:var(--s0-bg)}
.ov-set{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.ov-set-0{color:#2563eb;background:#dbeafe}
.ov-set-1{color:#16a34a;background:#dcfce7}
.ov-set-2{color:#ea580c;background:#ffedd5}
.ov-set-3{color:#7c3aed;background:#ede9fe}
.ov-mono{font-size:11px;font-variant-numeric:tabular-nums;font-weight:500}

/* Ref card */
#refCard{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:500;overflow-y:auto;padding:24px 32px;color:#111}
#refCard.show{display:block}
.ref-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;border-bottom:2px solid #111;padding-bottom:12px}
.ref-title{font-size:16px;font-weight:700}
.ref-meta{font-size:11px;color:#888;margin-top:2px}
.ref-set-block{margin-bottom:18px;page-break-inside:avoid}
.ref-set-hdr{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;padding:3px 9px;border-radius:10px;display:inline-block}
.ref-set-hdr-0{color:#2563eb;background:#dbeafe}
.ref-set-hdr-1{color:#16a34a;background:#dcfce7}
.ref-set-hdr-2{color:#ea580c;background:#ffedd5}
.ref-set-hdr-3{color:#7c3aed;background:#ede9fe}
.ref-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:6px}
.ref-knob{border:1px solid #e5e5e5;border-radius:5px;padding:7px 9px;page-break-inside:avoid}
.ref-kh{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ref-knum{font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px}
.ref-knum-0{color:#dc2626;background:#fee2e2}
.ref-knum-1{color:#ea580c;background:#ffedd5}
.ref-knum-2{color:#ca8a04;background:#fef9c3}
.ref-knum-3{color:#16a34a;background:#dcfce7}
.ref-knum-4{color:#0891b2;background:#cffafe}
.ref-knum-5{color:#7c3aed;background:#ede9fe}
.ref-kcc{font-size:9px;color:#aaa;font-variant-numeric:tabular-nums}
.ref-kname{font-size:11px;font-weight:600;margin-bottom:1px;color:#111}
.ref-kcat{font-size:9px;color:#aaa;margin-bottom:1px}
.ref-kch{font-size:9px;color:#bbb;font-variant-numeric:tabular-nums}
.ref-empty{color:#ccc;font-style:italic;font-size:10px}
@media print{.ref-actions{display:none!important}}
</style>
</head>
<body>
<header>
  <div class="logo">CtrlCC <span>Patch Builder</span></div>
  <div class="hdr-right">
    <label style="font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;">Patch</label><input type="text" class="patch-name" id="patchName" value="MIDI Controller" placeholder="Patch name"/>
    <button class="btn btn-danger" onclick="clearAll()">Clear all</button>
    <button class="btn" onclick="showOverview()">Overview</button>
    <button class="btn" onclick="showRef()">Ref card</button>
    <button class="btn" onclick="triggerLoad()">Load .yml</button>
    <input type="file" id="ymlFileIn" accept=".yml,.yaml" style="display:none" onchange="loadYML(this)"/>
    <button class="btn btn-primary" onclick="exportYML()">Export .yml</button>
  </div>
</header>
<div class="device-bar">
  <label>Device:</label>
  <select id="brandSel" onchange="onBrandChange()">
    <option value="">— Select brand —</option>
  </select>
  <select id="modelSel" onchange="onModelChange()" disabled>
    <option value="">— Select model —</option>
  </select>
  <span class="device-info" id="deviceInfo"></span>
</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-sect">
      <div class="sb-label">Knob sets</div>
      <div class="set-tabs" id="setTabs"></div>
      <div class="set-name-row">
        <input type="text" class="set-name-inp" id="setNameInp" placeholder="Set name" oninput="renameSet(this.value)"/>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sb-sect">
      <div class="sb-label" id="knobLabel">Knobs</div>
      <div class="knob-list" id="knobList"></div>
    </div>
  </aside>
  <main class="main" id="mainArea">
    <div class="no-device">
      <p>Select a device above to assign MIDI CCs to knobs.</p>
    </div>
  </main>
</div>
<div class="status" id="status"></div>
<div id="refCard">
  <div class="ref-hdr">
    <div>
      <div class="ref-title" id="refTitle"></div>
      <div class="ref-meta" id="refMeta"></div>
    </div>
    <div class="ref-actions" style="display:flex;gap:6px;">
      <button onclick="window.print()" style="background:#1a1a1a;border:none;color:#fff;font-family:'Inconsolata',monospace;font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer;">Print</button>
      <button onclick="hideRef()" style="background:none;border:1px solid #ccc;font-family:'Inconsolata',monospace;font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer;">Close</button>
    </div>
  </div>
  <div id="refBody"></div>
</div>

// ── DEVICE SELECTOR ───────────────────────────────────────────────────────────
let deviceParams = {};
let deviceName = '';
let activeCat = '';

function initDeviceSelector() {
  const brandSel = document.getElementById('brandSel');
  Object.keys(DB).sort().forEach(brand => {
    const o = document.createElement('option');
    o.value = brand; o.textContent = brand;
    brandSel.appendChild(o);
  });
}

function onBrandChange() {
  const brand = document.getElementById('brandSel').value;
  const modelSel = document.getElementById('modelSel');
  modelSel.innerHTML = '<option value="">— Select model —</option>';
  modelSel.disabled = !brand;
  deviceParams = {}; activeCat = '';
  if (!brand) return;
  Object.keys(DB[brand]).sort().forEach(model => {
    const o = document.createElement('option');
    o.value = model; o.textContent = model;
    modelSel.appendChild(o);
  });
}

function onModelChange() {
  const brand = document.getElementById('brandSel').value;
  const model = document.getElementById('modelSel').value;
  if (!brand || !model) return;
  deviceName = brand + ' ' + model;
  deviceParams = DB[brand][model];
  const cats = Object.keys(deviceParams);
  activeCat = cats.length ? cats[0] : '';
  const total = cats.reduce((a,c) => a + deviceParams[c].length, 0);
  document.getElementById('deviceInfo').textContent = total + ' parameters';
  renderMain();
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const NUM_SETS=4, NUM_KNOBS=6;
const KNOB_COLORS=['#e84040','#e87020','#c8a000','#28a050','#1878d0','#8040c0'];
const SET_COLORS=['#2563eb','#16a34a','#ea580c','#7c3aed'];
const SET_COLORS_LIGHT=['#dbeafe','#dcfce7','#ffedd5','#ede9fe'];
const SET_COLORS_MID=['#93c5fd','#86efac','#fdba74','#c4b5fd'];
const SET_NAMES=['Set 1','Set 2','Set 3','Set 4'];
function mkKnob(i){return{alias:`K${i+1}`,cc:null,paramName:null,category:null,midiCh:0,midiDef:64};}
function mkSet(i){return{name:SET_NAMES[i],knobs:Array.from({length:NUM_KNOBS},(_,k)=>mkKnob(k))};}
let sets=Array.from({length:NUM_SETS},(_,i)=>mkSet(i));
let activeSet=0, activeKnob=0;

function getNote(cat,cc){
  if(!cat||!deviceParams[cat])return'';
  const p=deviceParams[cat].find(x=>x.cc===cc);
  return p?p.note:'';
}

function renderSetTabs(){
  const el=document.getElementById('setTabs');
  el.innerHTML='';
  sets.forEach((s,i)=>{
    const n=s.knobs.filter(k=>k.cc!==null).length;
    const d=document.createElement('div');
    d.className='set-tab';
    if(i===activeSet){
      d.style.background=SET_COLORS[i];
      d.style.borderColor=SET_COLORS[i];
      d.style.color='#fff';
    } else {
      d.style.background=SET_COLORS_LIGHT[i];
      d.style.borderColor=SET_COLORS_MID[i];
      d.style.color=SET_COLORS[i];
    }
    d.innerHTML=`<div class="set-tab-name">${s.name}</div><div class="set-tab-count">${n}/${NUM_KNOBS}</div>`;
    d.onclick=()=>{activeSet=i;activeKnob=0;renderAll();};
    el.appendChild(d);
  });
  document.getElementById('setNameInp').value=sets[activeSet].name;
  document.getElementById('setNameInp').style.borderColor=SET_COLORS[activeSet];
  document.getElementById('knobLabel').textContent=`Knobs — ${sets[activeSet].name}`;
}

function renderKnobList(){
  const el=document.getElementById('knobList');
  el.innerHTML='';
  sets[activeSet].knobs.forEach((k,i)=>{
    const d=document.createElement('div');
    d.className='knob-item';
    if(i===activeKnob){d.style.borderColor=KNOB_COLORS[i];d.style.background=KNOB_COLORS[i]+'15';}
    d.onclick=()=>{activeKnob=i;renderKnobList();renderMain();};
    d.innerHTML=`
      <div class="ki-row">
        <span class="ki-dot" style="background:${KNOB_COLORS[i]}"></span>
        <span class="ki-num">K${i+1}</span>
        <span class="ki-cc">${k.cc!==null?'CC'+k.cc:'—'}</span>
        <span class="ki-ch">${k.cc!==null?'ch'+(k.midiCh+1):''}</span>
      </div>
      <div>${k.cc!==null?`<div class="ki-name">${k.alias}</div>`:'<div class="ki-unset">unassigned</div>'}</div>`;
    el.appendChild(d);
  });
}

function renderMain(){
  if(!Object.keys(deviceParams).length){
    document.getElementById('mainArea').innerHTML=`<div class="no-device"><p>Select a device above to assign MIDI CCs to knobs.</p></div>`;
    return;
  }
  const k=sets[activeSet].knobs[activeKnob];
  const col=KNOB_COLORS[activeKnob];
  const setCol=SET_COLORS[activeSet];
  document.getElementById('mainArea').innerHTML=`
    <div class="main-hdr">
      <span class="main-hdr-dot" style="background:${col}"></span>
      <div>
        <h2 style="color:${col}">${sets[activeSet].name} / Knob ${activeKnob+1}</h2>
        <p>Assign a parameter and MIDI channel for this knob.</p>
      </div>
    </div>
    <div class="card" style="border-left:3px solid ${setCol}">
      <h3>Knob config</h3>
      <div class="form-row">
        <label>Label</label>
        <input type="text" id="aliasIn" value="${k.alias}"
          oninput="sets[activeSet].knobs[activeKnob].alias=this.value;renderKnobList();" />
      </div>
      <div class="form-row">
        <label>MIDI ch</label>
        <select id="chSel" onchange="sets[activeSet].knobs[activeKnob].midiCh=parseInt(this.value);renderKnobList();">
          ${Array.from({length:16},(_,i)=>`<option value="${i}"${k.midiCh===i?' selected':''}>Channel ${i+1}</option>`).join('')}
        </select>
      </div>
      ${k.cc!==null?`
      <div class="info-row">
        <span class="info-pill">
          <strong>${k.category}: ${k.paramName}</strong>
          &nbsp;·&nbsp; CC <strong style="color:${col}">${k.cc}</strong>
          ${getNote(k.category,k.cc)?`&nbsp;·&nbsp; ${getNote(k.category,k.cc)}`:''}
        </span>
        <button class="clear-btn" onclick="clearKnob()">[ clear ]</button>
      </div>`:''}
    </div>
    <div class="card">
      <h3>Parameter — ${deviceName}</h3>
      <div class="cat-grid" id="catGrid"></div>
      <div id="paramSec"></div>
    </div>
  `;
  renderCats();
}

function renderCats(){
  const el=document.getElementById('catGrid');
  if(!el)return;
  el.innerHTML='';
  Object.keys(deviceParams).forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c===activeCat?' active':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;renderCats();renderParams();};
    el.appendChild(b);
  });
  renderParams();
}

function renderParams(){
  const sec=document.getElementById('paramSec');
  if(!sec)return;
  const k=sets[activeSet].knobs[activeKnob];
  const params=deviceParams[activeCat]||[];
  sec.innerHTML='<div class="param-grid" id="paramGrid"></div>';
  const grid=document.getElementById('paramGrid');
  params.forEach(p=>{
    const sel=k.cc===p.cc&&k.category===activeCat;
    const b=document.createElement('button');
    b.className='param-btn'+(sel?' selected':'');
    b.innerHTML=`<span>${p.name}</span><span class="param-cc">CC ${p.cc}</span>`;
    b.onclick=()=>{
      const kn=sets[activeSet].knobs[activeKnob];
      kn.cc=p.cc; kn.paramName=p.name; kn.category=activeCat; kn.midiDef=p.def;
      if(kn.alias===`K${activeKnob+1}`) kn.alias=p.name;
      renderKnobList(); renderMain();
    };
    grid.appendChild(b);
  });
}

function clearKnob(){sets[activeSet].knobs[activeKnob]=mkKnob(activeKnob);renderKnobList();renderMain();}
function renameSet(v){sets[activeSet].name=v||`Set ${activeSet+1}`;renderSetTabs();}
function clearAll(){if(!confirm('Clear all assignments?'))return;sets=Array.from({length:NUM_SETS},(_,i)=>mkSet(i));activeSet=0;activeKnob=0;renderAll();}
function renderAll(){renderSetTabs();renderKnobList();renderMain();}
function showStatus(msg){const b=document.getElementById('status');b.textContent=msg;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),3500);}

function showOverview(){
  const all=sets.flatMap((s,si)=>s.knobs.map((k,ki)=>({...k,setName:s.name,si,ki}))).filter(k=>k.cc!==null);
  if(!all.length){showStatus('No knobs assigned yet');return;}
  document.getElementById('mainArea').innerHTML=`
    <div class="main-hdr"><div>
      <h2 style="font-family:'Inconsolata',monospace">All assignments</h2>
      <p>${all.length} total across ${NUM_SETS} sets.</p>
    </div></div>
    <div class="card">
      <table class="ov-table">
        <thead><tr><th>Set</th><th>Knob</th><th>Label</th><th>Parameter</th><th>CC</th><th>Ch</th><th>Note</th></tr></thead>
        <tbody>
          ${all.map(k=>`<tr>
            <td><span class="ov-set ov-set-${k.si}">${k.setName}</span></td>
            <td><span class="ov-mono" style="color:${KNOB_COLORS[k.ki]}">K${k.ki+1}</span></td>
            <td>${k.alias}</td>
            <td style="font-size:11px;color:var(--text2)">${k.category}: ${k.paramName}</td>
            <td class="ov-mono">CC ${k.cc}</td>
            <td class="ov-mono">ch${k.midiCh+1}</td>
            <td class="ov-mono" style="color:var(--text3);font-size:10px">${getNote(k.category,k.cc)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function showRef(){
  const patchName=document.getElementById('patchName').value.trim()||'Patch';
  const total=sets.reduce((a,s)=>a+s.knobs.filter(k=>k.cc!==null).length,0);
  if(!total){showStatus('No knobs assigned yet');return;}
  document.getElementById('refTitle').textContent=patchName;
  document.getElementById('refMeta').textContent=`${total} assignments · ${deviceName||'MIDI Controller'}`;
  const body=document.getElementById('refBody');
  body.innerHTML='';
  sets.forEach((s,si)=>{
    const block=document.createElement('div');
    block.className='ref-set-block';
    block.innerHTML=`<div class="ref-set-hdr ref-set-hdr-${si}">${s.name}</div><div class="ref-grid" id="rg-${si}"></div>`;
    body.appendChild(block);
    const grid=document.getElementById(`rg-${si}`);
    s.knobs.forEach((k,ki)=>{
      const d=document.createElement('div');
      d.className='ref-knob';
      d.style.borderLeftColor=KNOB_COLORS[ki];
      d.style.borderLeftWidth='3px';
      d.innerHTML=k.cc!==null?`
        <div class="ref-kh"><span class="ref-knum ref-knum-${ki}">K${ki+1}</span><span class="ref-kcc">CC ${k.cc}</span></div>
        <div class="ref-kname">${k.alias}</div>
        <div class="ref-kcat">${k.category}</div>
        <div class="ref-kch">ch ${k.midiCh+1}</div>`
        :`<div class="ref-kh"><span class="ref-knum ref-knum-${ki}">K${ki+1}</span></div><div class="ref-empty">—</div>`;
      grid.appendChild(d);
    });
  });
  document.getElementById('refCard').classList.add('show');
}
function hideRef(){document.getElementById('refCard').classList.remove('show');}

function triggerLoad(){document.getElementById('ymlFileIn').value='';document.getElementById('ymlFileIn').click();}

function loadYML(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    try{
      const nameMatch=text.match(/patch_name:\s*'([^']*)'/);
      if(nameMatch) document.getElementById('patchName').value=nameMatch[1];
      const dataMatch=text.match(/data:\s*\|-\s*\n\s*([^\n]+)/);
      if(!dataMatch) throw new Error('No save_state found');
      const stateStr=dataMatch[1].trim();
      const parts=stateStr.split('|');
      if(parts.length<9) throw new Error('Invalid format');
      sets=Array.from({length:NUM_SETS},(_,i)=>mkSet(i));
      const as=parseInt(parts[0])||0;
      activeSet=(as>=0&&as<NUM_SETS)?as:0;
      for(let s=0;s<4;s++){
        const ccs=(parts[s+1]||'').split(',').map(x=>parseInt(x)||0);
        for(let k=0;k<NUM_KNOBS;k++){
          const cc=ccs[k]||0;
          if(cc>0){
            sets[s].knobs[k].cc=cc;
            let found=false;
            for(const cat of Object.keys(deviceParams)){
              const p=deviceParams[cat].find(x=>x.cc===cc);
              if(p){sets[s].knobs[k].paramName=p.name;sets[s].knobs[k].category=cat;sets[s].knobs[k].midiDef=p.def;
                if(sets[s].knobs[k].alias===`K${k+1}`)sets[s].knobs[k].alias=p.name;found=true;break;}
            }
            if(!found){sets[s].knobs[k].paramName='CC'+cc;sets[s].knobs[k].category='Unknown';sets[s].knobs[k].midiDef=64;}
          }
        }
      }
      for(let s=0;s<4;s++){
        const chs=(parts[s+5]||'').split(',').map(x=>parseInt(x)||0);
        for(let k=0;k<NUM_KNOBS;k++) sets[s].knobs[k].midiCh=Math.min(chs[k]||0,15);
      }
      for(let s=0;s<4;s++){const name=(parts[s+9]||'').trim();if(name)sets[s].name=name;}
      activeKnob=0; renderAll();
      showStatus('Loaded: '+file.name);
    }catch(err){showStatus('Load failed: '+err.message);}
  };
  reader.readAsText(file);
}

function buildSaveState(){
  const parts=[String(activeSet)];
  for(let s=0;s<4;s++) parts.push(sets[s].knobs.map(k=>k.cc!==null?k.cc:0).join(','));
  for(let s=0;s<4;s++) parts.push(sets[s].knobs.map(k=>k.midiCh).join(','));
  for(let s=0;s<4;s++) parts.push(sets[s].name.replace(/[|,]/g,'').substring(0,8));
  return parts.join('|');
}

function midiToStatic(midi){return (midi/127.0).toFixed(4);}

function exportYML(){
  const patchName=document.getElementById('patchName').value.trim()||'MIDI Controller';
  const allKnobs=sets.flatMap(s=>s.knobs.filter(k=>k.cc!==null));
  if(!allKnobs.length){showStatus('No knobs assigned');return;}
  function buildSetEntry(s){
    const assigned=s.knobs.filter(k=>k.cc!==null);
    if(!assigned.length)return'';
    let lines=`    - name: '${s.name.replace(/'/g,'')}'\n      set:\n`;
    s.knobs.forEach((k,ki)=>{
      if(!k.cc)return;
      lines+=`        - panel_knob_id: ${ki}\n          module_id: 1\n          param_id: ${ki}\n          curve_type: 0\n          min: 0.0\n          max: 1.0\n`;
    });
    return lines;
  }
  let mappedKnobLines=buildSetEntry(sets[activeSet]);
  sets.forEach((s,si)=>{if(si!==activeSet)mappedKnobLines+=buildSetEntry(s);});
  if(!mappedKnobLines)mappedKnobLines=`    - name: '${sets[activeSet].name.replace(/'/g,'')}'\n      set: []\n`;
  const stateData=buildSaveState();
  const staticKnobs=sets[activeSet].knobs.map((k,i)=>
    `    - {module_id: 1, param_id: ${i}, value: ${midiToStatic(k.midiDef)}}`
  ).join('\n');
  const yml=`PatchData:
  patch_name: '${patchName.replace(/'/g,'')}'
  description: '${deviceName||'MIDI Controller'} — CtrlCC plugin'
  module_slugs:
    0: HubMedium
    1: 'CtrlCC:CtrlCC'
  int_cables: []
  mapped_ins: []
  mapped_outs: []
  static_knobs:
${staticKnobs}
  mapped_knobs:
${mappedKnobLines}  midi_maps:
    name: MIDI
    set: []
  midi_poly_num: 1
  midi_poly_mode: 0
  midi_pitchwheel_range: 1
  mapped_lights: []
  vcvModuleStates:
    - module_id: 1
      data: |-
        ${stateData}
  suggested_samplerate: 0
  suggested_blocksize: 0
  bypassed_modules: []
  module_aliases: []
`;
  const blob=new Blob([yml],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=patchName.replace(/[^a-z0-9\-_]/gi,'_')+'.yml';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showStatus(`Exported — ${allKnobs.length} assignments`);
}

initDeviceSelector();
renderSetTabs();
renderKnobList();
