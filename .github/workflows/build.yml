name: Build MetaModule Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build git

      - name: Fetch MetaModule Plugin SDK
        run: |
          git clone --depth=1 https://github.com/4ms/metamodule-plugin-sdk.git

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMETAMODULE_PLUGIN_SDK_DIR=${{ github.workspace }}/metamodule-plugin-sdk \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/metamodule-plugin-sdk/cmake/arm-none-eabi.cmake

      - name: Build
        run: cmake --build build

      - name: Package plugin
        run: |
          mkdir -p dist
          find build -name "*.mmplugin" -exec cp {} dist/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-mmplugin
          path: dist/
          retention-days: 30
