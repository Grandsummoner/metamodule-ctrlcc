name: Build MetaModule Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake git
          sudo apt-get install -y ninja-build || pip install ninja

      - name: Verify tools
        run: |
          arm-none-eabi-gcc --version
          cmake --version
          ninja --version

      - name: Fetch SDK
        run: |
          git clone --depth=1 --recurse-submodules \
            https://github.com/4ms/metamodule-plugin-sdk.git \
            sdk

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMETAMODULE_PLUGIN_SDK_DIR=${{ github.workspace }}/sdk \
            -S plugin

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-mmplugin
          path: build/
          retention-days: 30
