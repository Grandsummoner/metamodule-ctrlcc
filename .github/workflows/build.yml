name: Build MetaModule Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git

      - name: Install ARM toolchain v12
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz
          tar xf arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz
          echo "${{ github.workspace }}/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: arm-none-eabi-gcc --version

      - name: Fetch SDK
        run: |
          git clone --depth=1 --recurse-submodules \
            https://github.com/4ms/metamodule-plugin-sdk.git \
            metamodule-plugin-sdk

      - name: Create assets dir
        run: mkdir -p plugin/assets

      - name: Configure
        run: |
          cmake --fresh -B build -G Ninja \
            -DMETAMODULE_SDK_DIR=${{ github.workspace }}/metamodule-plugin-sdk \
            -S plugin

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-mmplugin
          path: plugin/metamodule-plugins/
          retention-days: 30
