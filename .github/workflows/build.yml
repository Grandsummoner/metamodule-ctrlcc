name: Build MetaModule Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup and Build
        run: |
          # A. Install Tools
          sudo apt-get update && sudo apt-get install -y ninja-build cmake wget
          
          # B. Clone SDK
          git clone https://github.com/4ms/metamodule-plugin-sdk.git metamodule-plugin-sdk
          
          # C. Get Compiler
          wget https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz
          tar -xf arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz
          
          # D. Configure
          cmake -B build -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/metamodule-plugin-sdk/toolchain-arm-none-eabi.cmake \
          -DTOOLCHAIN_BASE_DIR=${{ github.workspace }}/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi
          
          # E. Build
          cmake --build build

      - name: 3. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-Plugin
          path: build/*.mmplugin
