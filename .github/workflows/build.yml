name: Build MetaModule Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Clone SDK and Install Tools
        # We combine these to ensure they happen BEFORE cmake runs
        run: |
          git clone https://github.com/4ms/metamodule-plugin-sdk.git metamodule-plugin-sdk
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: 3. Setup ARM Toolchain
        run: |
          wget https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz
          tar -xf arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz

      - name: 4. Configure
        run: |
          cmake --fresh -B build -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=metamodule-plugin-sdk/toolchain-arm-none-eabi.cmake \
          -DTOOLCHAIN_BASE_DIR=${{ github.workspace }}/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi

      - name: 5. Build
        run: cmake --build build

      - name: 6. Upload Plugin
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-Plugin
          path: build/*.mmplugin
