name: Build MetaModule Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Tools and SDK
        run: |
          sudo apt-get update && sudo apt-get install -y ninja-build cmake wget
          
          # We force the clone into the EXACT directory CMake is complaining about
          git clone --depth 1 https://github.com/4ms/metamodule-plugin-sdk.git ${{ github.workspace }}/metamodule-plugin-sdk
          
          # Download and unpack ARM compiler
          wget https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz
          tar -xf arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz

      - name: 3. Configure and Build
        run: |
          cmake -B build -G Ninja \
          -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/metamodule-plugin-sdk/toolchain-arm-none-eabi.cmake \
          -DTOOLCHAIN_BASE_DIR=${{ github.workspace }}/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi
          
          cmake --build build

      - name: 4. Upload Plugin
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-Plugin
          path: build/*.mmplugin
