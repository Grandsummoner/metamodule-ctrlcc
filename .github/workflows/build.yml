name: Build MetaModule Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM toolchain and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build git python3

      - name: Fetch MetaModule Plugin SDK
        run: |
          git clone --depth=1 --recurse-submodules \
            https://github.com/4ms/metamodule-plugin-sdk.git \
            ../metamodule-plugin-sdk

      - name: Create assets dir
        run: mkdir -p assets

      - name: Configure
        run: cmake --fresh -B build -G Ninja

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-mmplugin
          path: metamodule-plugins/
          retention-days: 30
