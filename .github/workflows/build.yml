name: Build MetaModule Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git python3

      - name: Install ARM toolchain v12.3
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz
          tar xf arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi.tar.xz
          echo "${{ github.workspace }}/arm-gnu-toolchain-12.3.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: arm-none-eabi-gcc --version

      - name: Fetch MetaModule Plugin SDK
        run: |
          git clone --depth=1 --recurse-submodules \
            https://github.com/4ms/metamodule-plugin-sdk.git \
            metamodule-plugin-sdk

      - name: Inspect SDK headers 2
        run: |
          echo "=== element_info_view.hh ===" 
          cat metamodule-plugin-sdk/core-interface/CoreModules/elements/element_info_view.hh
          echo "=== base_element.hh first 80 ===" 
          head -80 metamodule-plugin-sdk/core-interface/CoreModules/elements/base_element.hh
          echo "=== register_module.hh full ===" 
          cat metamodule-plugin-sdk/core-interface/CoreModules/register_module.hh
          echo "=== midi headers ===" 
          find metamodule-plugin-sdk -name "*.hh" -o -name "*.h" | xargs grep -l -i "midi" 2>/dev/null

      - name: Create empty assets dir
        run: mkdir -p assets

      - name: Configure
        run: |
          cmake --fresh -B build -G Ninja \
            -DMETAMODULE_SDK_DIR=${{ github.workspace }}/metamodule-plugin-sdk

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-mmplugin
          path: metamodule-plugins/
          retention-days: 30
