name: Build MetaModule Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=metamodule-plugin-sdk/cmake/arm-none-eabi.cmake

      - name: Build
        run: cmake --build build

      - name: Package plugin
        run: |
          mkdir -p dist
          cp build/RytmCC.mmplugin dist/ 2>/dev/null || \
          find build -name "*.mmplugin" -exec cp {} dist/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RytmCC-mmplugin
          path: dist/
          retention-days: 30
